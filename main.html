<!DOCTYPE html>
<html>
    <head><title>Hoksolinvan_Chhun</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png"> 
    <script src="https://unpkg.com/gifler@0.1.0/gifler.min.js"></script>
    <style>

        #text_id { 
            width:100vw;
            height: 25%;
            background-color: aliceblue;
            position: absolute;
            bottom: 0;
            left: 0;
            visibility: hidden;
            font-family: "Pixelify Sans", sans-serif;
            font-size: 40px;
            padding-left: 5%;
            align-items: center;
            border: 10px solid rgb(105, 12, 12);
        }


    </style>
    </head>
    
    <body id="body_element" style="background-color:black; height: 100vh; width: 100vw;">

        <div style=" display:flex;  justify-content:center; align-items:center;">
        <canvas id="canvas" width="700" height="700" style="background-color:white;"></canvas>
        </div>


        <div id="text_id"><p style="margin-left:-4%; margin-top:0%; font-weight:900;">Van</p><div style="margin-top:-3%; word-wrap:break-word;"></div></div>








        <!-- Script -->
        <script>

            let global_counter_y =0;
            let global_counter_x = 0;
            let current_direction=4;
            document.addEventListener('keydown',(e)=>{
                switch(e.code){
                    case 'KeyW': 
                    global_counter_y+=10;
                    current_direction=1;
                    console.log(global_counter_y);
                    break;
                    case 'KeyA':
                    global_counter_x-=10;
                    current_direction=2;
                    console.log(global_counter_x);
                    break;
                    case 'KeyS':
                    global_counter_y-=10;
                    current_direction=3;
                    console.log(global_counter_y);
                    break;
                    case 'KeyD':
                    global_counter_x+=10;
                    current_direction=4;
                    console.log(global_counter_x);
                    break;
                    case 'KeyE':
                        const text_element_node = document.getElementById('text_id');
                        const style = window.getComputedStyle(text_element_node).visibility;
                        if(style=="hidden"){
                            text_element_node.style.visibility = "visible";
                        }
                        else{
                            text_element_node.style.visibility = "hidden";
                        }

                    break;
                }
            });


            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            
            // Van's Sprite Character
            const data = {"frames":{"New Piskel0.png":{"frame":{"x":0,"y":0,"w":47,"h":32}},"New Piskel1.png":{"frame":{"x":0,"y":32,"w":47,"h":32}},"New Piskel2.png":{"frame":{"x":0,"y":64,"w":47,"h":32}},"New Piskel3.png":{"frame":{"x":0,"y":96,"w":47,"h":32}},"New Piskel4.png":{"frame":{"x":0,"y":128,"w":47,"h":32}},"New Piskel5.png":{"frame":{"x":0,"y":160,"w":47,"h":32}},"New Piskel6.png":{"frame":{"x":0,"y":192,"w":47,"h":32}},"New Piskel7.png":{"frame":{"x":0,"y":224,"w":47,"h":32}},"New Piskel8.png":{"frame":{"x":0,"y":256,"w":47,"h":32}}}};
            const player_frames = [[0,0,47,32],[0,32,47,32],[0,64,47,32],[0,96,47,32],[0,128,47,32],[0,160,47,32],[0,192,47,32],[0,224,47,32],[0,256,47,32]];

            // Cat's Sprite Character
            const cat_frames = [[0,0,32,32],[32,0,32,32],[64,0,32,32],[96,0,32,32]];

            let frame_index = 0;
let lastTime = 0;
const CAT_FPS = 8;

            const frame_location = [];
            for (const key in data.frames) {
                const frame = data.frames[key].frame;
                frame_location.push([frame.x, frame.y, frame.w, frame.h]);
            }

            function loadImages(src) {
                return new Promise((resolve, reject) => {
                    const image = new Image();
                    image.src = src;
                    image.onload = () => resolve(image);
                    image.onerror = () => reject;
                });
            }

            const offscreen = document.createElement('canvas');
            gifler('assets/sprite_furnitures/ibm5150_animated.gif').animate(offscreen);
            const offscreen2 = document.createElement('canvas');
            gifler('assets/sprite_furnitures/ramen_transparent.gif').animate(offscreen2);


            async function init() {
                const player        = await loadImages("assets/sprite_character/New Piskel.png");
                const floorsWall    = await loadImages("assets/sprite_furnitures/darkwood_floor.png");
                const floorsWall_lrk = await loadImages("assets/sprite_furnitures/floorswalls_LRK.png");
                const desk          = await loadImages("assets/sprite_furnitures/desk_updated.png");
                const carpet        = await loadImages("assets/sprite_furnitures/carpet.png");
                const cat           = await loadImages("assets/sprite_furnitures/Cat.png");
                const bed           = await loadImages("assets/sprite_furnitures/master_bed.png");
                const sofa1 = await loadImages("assets/sprite_furnitures/sofa_1.png");
                const sofa2 = await loadImages("assets/sprite_furnitures/sofa_2.png");
                const table = await loadImages("assets/sprite_furnitures/table.png");
                const flowerPot = await loadImages("assets/sprite_furnitures/Flower.png");
                const table_2 = await loadImages("assets/sprite_furnitures/interior_free.png");
                const book = await loadImages("assets/sprite_furnitures/book_transparent.png");
                const joystick = await loadImages("assets/sprite_furnitures/joystick.png");
                const kettlebell = await loadImages("assets/sprite_furnitures/kettlebell.png");
                
                ctx.imageSmoothingEnabled = false;

                function render(timestamp) {
                    ctx.clearRect(0, 0, 700, 700); // clear every frame

                    // floors
                    for (let i = 0; i < 700; i += 100) {
                        ctx.drawImage(floorsWall, i, 0, 100, 100);
                    }
                    for (let i = 0; i < 700; i += 100) {
                        for (let j = 100; j < 700; j += 100) {
                            ctx.drawImage(floorsWall_lrk, i, j, 100, 100);
                        }
                    }

                    // furniture back to front
                    ctx.drawImage(bed, 0, 300, 200, 200);
                    ctx.drawImage(desk, -10, 13, 200, 100);
                    ctx.drawImage(offscreen, 20, 2, 55, 55); // gif on desk
                    ctx.drawImage(carpet, 300, 300, 200, 200);
                    ctx.drawImage(sofa1,305,165,200,150);
                    ctx.drawImage(sofa2,495,300,130,200);
                    ctx.drawImage(table,490,200,120,120);
                    ctx.drawImage(flowerPot,523,195,50,50);
                    ctx.drawImage(table_2,0,500,75,75);
                    ctx.drawImage(offscreen2,10,485,55,55);
                    ctx.drawImage(book,100,15,40,40);
                    ctx.drawImage(kettlebell,-25,550,125,125);
                    ctx.drawImage(joystick,15,625,50,50);
                    ctx.drawImage(player,player_frames[0][0],player_frames[0][1],player_frames[0][2],player_frames[0][3],100,100,175,150);

                    if (timestamp - lastTime > 1000 / CAT_FPS) {
        frame_index = (frame_index + 1) % 4;
        lastTime = timestamp;
    }

                    const [sx,sy,sw,sh] = cat_frames[frame_index];
                    ctx.drawImage(cat,sx,sy,sw,sh, 337, 290, 120, 120);

                    requestAnimationFrame(render);
                }

                render(lastTime);
            }

            init();
        </script>
    </body>
</html>
